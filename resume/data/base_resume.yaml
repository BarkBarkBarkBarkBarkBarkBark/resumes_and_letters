# Standalone projects separate from work/volunteer roles.
# Add entries here as the pipeline grows.
projects:
  - name: Dark Horse Neuro / Neuralynx acquisition pipeline
    dates: 2026
    bullets:
      - Built a Python orchestration layer to launch DHN-AQ headlessly over SSH,
        generate RC/CS session files, and coordinate Pegasus / NetCom replay
        workflows for human intracranial recordings.
      - Implemented an NRD replay bridge that re-broadcasts ATLAS-format UDP
        packets so archived Neuralynx sessions can be ingested by DHN-AQ as if
        hardware were live.
      - Automated compression-aware MED recording setup for 512-channel macro /
        micro configurations, including decimation, lossless/lossy options, and
        pre-flight network diagnostics.
    links:
      - label: GitHub
        url: https://github.com/BarkBarkBarkBarkBarkBarkBark/dhn_client
      - label: Docs
        url: https://barkbarkbarkbarkbarkbarkbark.github.io/dhn_client/
    tags: [neuroengineering, research, technical, data_acquisition, compression, signal_processing, python]

  - name: spike_discrim single-unit DSP workbench
    dates: 2026
    bullets:
      - Benchmarked low-latency waveform representations for real-time single-unit
        discrimination using curated OSort snippets, synthetic data, AUC,
        balanced accuracy, mutual information, and KNN purity.
      - Built a Numba-accelerated WeightBank population code to score
        spike-likeness and project waveforms into afferent activation space for
        clustering and unit-separation analysis.
    links:
      - label: GitHub
        url: https://github.com/BarkBarkBarkBarkBarkBarkBark/spike_discrim
    tags: [neuroengineering, research, technical, spike_sorting, signal_processing, ml, realtime]

  - name: SNN Agent real-time spike sorting
    dates: 2026
    bullets:
      - Developed a streaming spiking neural network with bandpass filtering,
        Kalman noise gating, competitive STDP, and browser-based monitoring for
        live spike detection and sorting.
      - Evaluated 20 kHz real-time pipeline behavior across synthetic, .ncs,
        UDP, and LSL inputs with online decoding for closed-loop neurotech use
        cases.
    links:
      - label: GitHub
        url: https://github.com/BarkBarkBarkBarkBarkBarkBark/SNNeuro
    tags: [neuroengineering, research, technical, spike_sorting, signal_processing, ml, realtime]

