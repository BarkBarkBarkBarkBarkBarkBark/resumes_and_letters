# Multiple summary variants — the active one is selected by role profile.
summary:
  neuroengineering: >
    Neuroscience researcher and data engineer with active experience in spike sorting
    intracranial recordings from epilepsy patients using Kilosort4, O-Sort, and
    SpikeInterface. Building GPU-accelerated spike sorting pipelines on AWS EC2.
    Background in Python, MATLAB, machine learning, and 5 years of applied data
    systems work. Seeking to contribute to neural signal processing research and
    BCI development.

  data_analytics: >
    Evaluation and data systems professional with 5 years supporting 4 shelter sites
    serving 400+ people/month and their integrated clinical partnerships. Led mixed
    methods efforts including surveys and focus groups, built reporting workflows, and
    translated findings into funder-ready narratives and operational decisions.
    Experienced with Python/SQL, SPSS, dashboards, and Microsoft 365 automation.
    Committed to equity-centered learning and improving health and housing outcomes.

  default: >
    Data systems and evaluation professional with 5 years building outcomes measurement
    infrastructure for homeless services programs. Active neuroscience researcher with
    hands-on experience in spike sorting, intracranial electrophysiology, and ML-based
    neural signal processing. Background spans Python/SQL engineering, clinical data
    coordination, and scientific communication. Pursuing a neuroinformatics career at
    the intersection of systems neuroscience and BCI engineering.

# Skills are organized into named categories.
# The active profile controls which categories appear and in what order.
skills:
  - category: Neural Data & Signal Processing
    items:
      - Spike sorting (Kilosort4, O-Sort, SpikeInterface)
      - Neural data processing (filtering, PCA, template matching)
      - MATLAB neurophysiology workflows
      - Intracranial electrophysiology (LFP, single-unit)
    tags: [neuroengineering, research, technical]

  - category: Machine Learning & Data Science
    items:
      - Python (NumPy, Pandas, scikit-learn, PyTorch)
      - Statistical analysis (SPSS)
      - SQL and database engineering (PostgreSQL, PGVector)
      - Cloud GPU computing (AWS EC2, CUDA, Docker)
    tags: [neuroengineering, analytics, technical]

  - category: Data Systems & Reporting
    items:
      - Dashboards and stakeholder reporting (Looker)
      - Workflow automation (Microsoft 365, Power Automate)
      - Survey design and focus group facilitation
      - Equity-informed outcomes measurement
    tags: [analytics, evaluation, management]

  - category: General Technical
    items:
      - Git and version control
      - Linux and shell scripting
      - Web interfaces (Streamlit)
      - Microsoft 365 administration
    tags: [technical, it]

