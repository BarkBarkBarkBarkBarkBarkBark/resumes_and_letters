    Recently admitted to the UC Davis M.S. in Biomedical Engineering (Fall 2026)
    and active neuroscience researcher working at the intersection of human
    intracranial electrophysiology, single-unit digital signal processing, and
    neurotechnology tooling. Experience includes spike sorting with Kilosort4,
    O-Sort, and SpikeInterface; building GPU-accelerated pipelines on AWS; and
    implementing Dark Horse Neuro / Neuralynx acquisition workflows for replay,
    compression-aware MED recording, and large-scale neural data handling.
    I look forward to a career in neural signal processing, neural acquisition
    systems, and BCI-related infrastructure.

