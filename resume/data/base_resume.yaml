    Evaluation and data systems professional with 5 years supporting 4 shelter sites
    serving 400+ people/month and their integrated clinical partnerships. Led mixed
    methods efforts including surveys and focus groups, built reporting workflows, and
    translated findings into funder-ready narratives and operational decisions.
    Experienced with Python/SQL, SPSS, dashboards, and Microsoft 365 automation.
    Committed to equity-centered learning and improving health and housing outcomes.

  default: >
    Recently admitted to the UC Davis M.S. in Biomedical Engineering (Fall 2026)
    with a growing research focus in human electrophysiology, single-unit DSP,
    and neurotechnology engineering. Background spans Python/MATLAB tooling,
    spike sorting, acquisition workflow automation, clinical data coordination,
    and scientific communication. I look forward to a career at the intersection
    of systems neuroscience, neural data infrastructure, and BCI engineering.

